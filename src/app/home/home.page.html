<ion-header [translucent]="true" *ngIf="!arMode">
  <ion-toolbar>
    <ion-title>AR Real Estate</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" [style.--background]="arMode ? 'transparent' : 'var(--ion-background-color)'">

  <div *ngIf="!arMode" class="ion-padding ion-text-center landing">
    <h1>🏠 AR Property Finder</h1>
    <p>Point your camera around the city to see properties on real buildings.</p>

    <div *ngIf="capsChecked" class="caps-badge" [class.ok]="caps?.ready" [class.warn]="!caps?.ready">
      <ion-icon [name]="caps?.ready ? 'checkmark-circle' : 'warning'"></ion-icon>
      <div>
        <strong>{{ caps?.ready ? 'AR Ready' : 'AR Unavailable' }}</strong>
        <span *ngIf="caps?.reason">First blocker: {{ caps?.reason }}</span>
      </div>
    </div>

    <div *ngIf="!capsChecked" class="caps-loading">
      <ion-spinner name="dots"></ion-spinner>
      <span>Detecting hardware…</span>
    </div>

    <ion-list class="caps-list" *ngIf="capsChecked && capabilityGroups.length" lines="inset">
      <ng-container *ngFor="let group of capabilityGroups; trackBy: trackByGroup">
        <ion-list-header>
          <ion-label>{{ group.name }}</ion-label>
        </ion-list-header>
        <ion-item
          *ngFor="let row of group.rows; trackBy: trackByRow"
          class="cap-row"
          [class]="'cap-' + row.status">
          <ion-icon slot="start" [name]="row.icon" aria-hidden="true"></ion-icon>
          <ion-label class="ion-text-wrap">
            <h3>{{ row.label }}</h3>
            <p>{{ row.detail }}</p>
          </ion-label>
          <ion-icon slot="end" [name]="statusIcon(row.status)" class="status-icon"></ion-icon>
        </ion-item>
      </ng-container>
    </ion-list>

    <ion-button (click)="startAr()" expand="block" shape="round" [disabled]="!capsChecked">
      <ion-icon slot="start" name="camera-outline"></ion-icon>
      Explore Properties
    </ion-button>

    <ion-button *ngIf="capsChecked && !caps?.ready" (click)="refreshCapabilities()" expand="block" shape="round" fill="outline" color="medium">
      <ion-icon slot="start" name="refresh-outline"></ion-icon>
      Recheck
    </ion-button>
  </div>

  <div *ngIf="arMode" class="ar-overlay">
    <div class="markers">
      <button
        type="button"
        class="marker"
        *ngFor="let spot of spots$ | async; trackBy: trackBySpot"
        [style.left.%]="spot.screenX"
        [style.top.%]="spot.screenY"
        [style.--marker-size.%]="spot.size"
        (click)="onSpotTap(spot)">
        <div class="marker-pin">
          <span class="price">{{ spot.price }}</span>
        </div>
        <div class="marker-card">
          <strong>{{ spot.label }}</strong>
          <span>{{ formatDistance(spot.distanceMeters) }}</span>
        </div>
      </button>
    </div>

    <div class="bottom-bar">
      <ion-button (click)="stopAr()" color="danger" shape="round">
        <ion-icon slot="start" name="close-circle-outline"></ion-icon>
        Stop
      </ion-button>
    </div>
  </div>
</ion-content>
